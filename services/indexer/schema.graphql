# cogno-chain L4 Tier-B — the PUBLISHED, open GraphQL entity schema.
#
# This is the convergence contract of docs/L4-reading.md §4.1 / §6.2.1: any independent
# indexer that ingests the same finalized events and applies the SAME mapping (incl. the
# event-only stake-weighted tally fold below) produces byte-identical rows. Versioned to
# runtime spec_version 113 (the Twitter-like social features: votes, polls, reposts, quotes,
# follows, profiles, pinned posts).
#
# Sources (all public + deterministic L3 events; no Cardano, no wall-clock):
#   Microblog.PostCreated{id,author}   + the Microblog.Posts storage row (text/parent/quote)
#   Microblog.Voted{id,who,dir,weight} / VoteCleared{id,who}          (stake-weighted vote tally)
#   Microblog.Reposted{id,who}                                        (permanent repost edges)
#   Microblog.Followed{follower,followee} / Unfollowed{...}           (the follow graph)
#   Microblog.PollCreated{id,author}   + the Microblog.Polls storage row (option labels)
#   Microblog.PollVoted{id,who,option,weight}                         (stake-weighted poll tally)
#   Profile.ProfileSet{who} + the Profile.Profiles row / ProfileCleared{who}
#   Profile.PostPinned{who,id} / PostUnpinned{who}   + the Profile.PinnedPost row
#   CognoGate.IdentityLinked{who,identity} / Revoked{who,identity}
#   TalkStake.StakeSet{who,weight}
#
# NOTE: there is no PostDeleted — `delete_post` was removed (content is a permanent ledger), so
# the M4 `Post.deleted` soft-delete field is GONE. A frontend that wants to hide content filters
# client-side (the chain allows it all; frontends curate).
#
# THE TALLY-FOLD CONTRACT (verify-m4c re-derives this from events alone): votes / poll-votes are
# STAKE-WEIGHTED and CHANGEABLE. The runtime keeps each tally drift-free by, on every (re)vote /
# clear, REVERSING the voter's PREVIOUSLY-STORED weight then APPLYING the freshly-snapshotted one
# (saturating; floors at 0). The indexer mirrors this EXACTLY by keeping a per-(target,voter) Vote /
# PollVote row holding the last {choice, weight} and folding ONLY the events — never reading the
# on-chain VoteTally / PollTally. That is what lets anyone reproduce the tally byte-for-byte.

type Author @entity {
  id: ID! # AccountId (SS58, prefix 42)
  identityHash: String # 0x hex of blake2b_256(serialized owner Address) == beacon token_name (DR-01); null until bound
  banned: Boolean! # false on IdentityLinked, true on Revoked — the gate "is_allowed" mirror (revoke leaves posts intact)
  weight: BigInt # latest TalkStake.StakeSet weight (buried lovelace) — posting power; null until staked
  postCount: Int! # total posts CREATED by this author (does not decrement — content is permanent)

  # ── profile (pallet-profile @17) — presentation state, overwritten freely (NOT content) ──
  displayName: String # Profile.display_name; null until a profile is set, null again on clear
  bio: String # Profile.bio
  avatar: String # Profile.avatar (a URL / IPFS CID reference, NOT image bytes)
  pinnedPostId: String # Profile.PinnedPost — a bare post id (NOT a relation: the chain stores it unvalidated)

  # ── follow graph counters — FOLDED from Followed/Unfollowed events (inc/dec, saturating at 0) ──
  followerCount: Int! # accounts following this author
  followingCount: Int! # accounts this author follows

  posts: [Post]! @derivedFrom(field: "author")
  votes: [Vote]! @derivedFrom(field: "voter")
  reposts: [Repost]! @derivedFrom(field: "reposter")
  # Reverse follow edges. NAMED `outgoingFollows`/`incomingFollows` (not `following`/`followers`) so
  # postgraphile's auto-generated "order by related count" enum (`OUTGOING_FOLLOWS_COUNT_…`) does NOT
  # collide with the folded scalar columns `followingCount`/`followerCount` (`FOLLOWING_COUNT_…`).
  outgoingFollows: [Follow]! @derivedFrom(field: "follower") # edges where this author is the follower
  incomingFollows: [Follow]! @derivedFrom(field: "followee") # edges where this author is the followee
  pollVotes: [PollVote]! @derivedFrom(field: "voter")
}

type Post @entity {
  id: ID! # on-chain u64 post id (DR-21), as a string
  author: Author! # generates an authorId FK column
  text: String! # UTF-8 body, read from Microblog.Posts storage at the creating block
  parent: Post # null = top-level; self-relation reconstructs threads (a reply; not existence-checked on-chain)
  quote: Post # null = not a quote; a quote references a post WITHOUT being threaded under it (distinct from parent)
  replies: [Post]! @derivedFrom(field: "parent")
  blockHeight: Int! @index # the L3 block the post was created at (== Post.at; the UI shows this)
  timestamp: Date! @index # block wall-clock (Timestamp.set inherent) — for recency ordering

  # ── poll (a poll's question IS this post; only the options + tally live on the Poll/PollOption) ──
  isPoll: Boolean! # true once a PollCreated for this post id is folded; fetch the poll via the root
                   # `poll(id: <this post id>)` query (Poll.id == the host post id — a direct lookup)

  # ── stake-weighted vote tally — FOLDED from Voted/VoteCleared (reverse-then-apply, saturating) ──
  upWeight: BigInt! # sum of up-voters' weight snapshots
  downWeight: BigInt! # sum of down-voters' weight snapshots
  upCount: Int! # number of up-votes
  downCount: Int! # number of down-votes
  score: BigInt! # derived: upWeight - downWeight (MAY be negative); stored so it is queryable/sortable
  votes: [Vote]! @derivedFrom(field: "post")

  # ── reposts — permanent (no un-repost); only ever increments ──
  repostCount: Int!
  reposts: [Repost]! @derivedFrom(field: "post")
}

# One account's current vote on a post (id = "<postId>-<voterId>"). UPSERTED on Voted, REMOVED on
# VoteCleared — so this set is exactly the live votes, and {dir,weight} is the record the tally fold
# reverses on a re-vote (by the PREVIOUS event's weight, never current stake).
type Vote @entity {
  id: ID!
  post: Post!
  voter: Author!
  dir: String! # "Up" | "Down" (the VoteDir variant name)
  weight: BigInt! # the voter's AllowedStake snapshot at vote time (carried in the Voted event)
}

# A permanent repost edge (id = "<postId>-<reposterId>"). Created on Reposted, never removed
# (reposts are treated like content). The chain rejects a duplicate (AlreadyReposted), so id is unique.
type Repost @entity {
  id: ID!
  post: Post!
  reposter: Author!
  blockHeight: Int! @index # the block the Reposted event was observed in
}

# A live follow edge (id = "<followerId>-<followeeId>"). Created on Followed, REMOVED on Unfollowed
# (follows are relationships, toggleable — unlike content). The followee need not exist on-chain.
type Follow @entity {
  id: ID!
  follower: Author!
  followee: Author!
}

# A poll attached to a host post (id = the host post id, 1:1 with Post). Created on PollCreated; the
# option labels are read from Microblog.Polls storage at that block.
type Poll @entity {
  id: ID!
  post: Post!
  options: [PollOption]! @derivedFrom(field: "poll")
  votes: [PollVote]! @derivedFrom(field: "poll")
}

# One option of a poll (id = "<pollId>-<index>") with its stake-weighted tally FOLDED from PollVoted.
type PollOption @entity {
  id: ID!
  poll: Poll! @index
  index: Int! # the option's position (0-based; matches the on-chain option index PollVoted carries)
  label: String! # the option text (UTF-8), read from Microblog.Polls storage
  weight: BigInt! # sum of the weight snapshots of accounts currently choosing this option
  count: Int! # number of accounts currently choosing this option
}

# One account's current poll choice (id = "<pollId>-<voterId>"). Upserted on PollVoted; the record
# the per-option fold reverses on a re-cast (by the PREVIOUS event's weight + its option).
type PollVote @entity {
  id: ID!
  poll: Poll!
  voter: Author!
  option: Int! # the chosen option index
  weight: BigInt! # the voter's AllowedStake snapshot at cast time (carried in the PollVoted event)
}

# Optional convenience aggregate, keyed on a post's IMMEDIATE parent (or self for a top-level
# post) — NOT the transitive conversation root for depth-2+ replies. The feed's thread view uses
# the faithful Post.parent → `replies` reverse relation, not this; Thread is a deterministic extra
# and is DELIBERATELY EXCLUDED from the verify-m4c gate (a derived view, like Post.timestamp).
type Thread @entity {
  id: ID! # = immediate-parent post id (top-level ancestor only for depth-1 threads)
  root: Post!
  replyCount: Int!
  lastActivity: Date! @index
}
