# Journald cap for the cogno node — an always-on archive validator with Restart=always can otherwise
# fill the disk with logs. Install as a global drop-in:
#
#   sudo cp deploy/systemd/journald-cogno.conf /etc/systemd/journald.conf.d/cogno.conf
#   sudo systemctl restart systemd-journald
#
# (This bounds the WHOLE journal, not just the node; tune to taste. Referenced from deploy/README.md.)
[Journal]
SystemMaxUse=2G
MaxRetentionSec=2week
