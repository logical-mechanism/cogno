# cogno-chain Prometheus alert rules (all-Rust, observe-only). Two product-health signals:
#   • the chain is producing + finalizing blocks (cogno-node, built-in substrate_* metrics), and
#   • the node's Cardano OBSERVER is actually reading db-sync and crediting talk-stake weight every
#     block, not silently abstaining (cogno-observer, the in-node cogno_observer_* gauges).
# Every rule has a `for:` window so a transient scrape miss doesn't page. Tune to your cadence.
#
# There is no relayer / follower / indexer / shadow-diff any more — the all-Rust restart dropped
# anchoring, folded the follower's read helper + all reads into the node, and made the observer the SOLE
# weight writer (so the committee-vs-inherent "shadow diff" it used to compare no longer exists).
groups:
  - name: cogno-node
    rules:
      - alert: NodeDown
        expr: up{job="cogno-node"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "cogno-node is down (Prometheus cannot scrape :9615)"

      - alert: FinalityStalled
        # GRANDPA finalized height not advancing for 10m. delta() (gauge), NOT increase() (counter):
        # substrate_block_height is a GAUGE, and increase()'s counter-reset correction would HIDE a
        # finality REVERSION (height moving backwards) by reading it as positive progress.
        expr: delta(substrate_block_height{job="cogno-node",status="finalized"}[10m]) == 0
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "cogno-chain finality has stalled (finalized height flat for 10m)"

      - alert: BlockProductionStalled
        expr: delta(substrate_block_height{job="cogno-node",status="best"}[10m]) == 0
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "cogno-chain is not producing blocks (best height flat for 10m)"

      # NodeNoPeers — SHIPPED DISABLED (commented out). A single --force-authoring validator (the
      # default topology) runs at 0 peers forever, so this would false-page ~15m after boot and never
      # clear. Uncomment the WHOLE block on a MULTI-validator network.
      # - alert: NodeNoPeers
      #   expr: substrate_sub_libp2p_peers_count{job="cogno-node"} == 0
      #   for: 15m
      #   labels: { severity: warning }
      #   annotations:
      #     summary: "cogno-node has 0 peers (expected only for a single-validator chain)"

  # The Cardano observer (in-protocol weight, D4). These gauges are updated ONLY by the AUTHORING
  # producer (node/src/service.rs records exactly one observation/abstain per AUTHORED block) — a
  # non-authoring tracking node registers them but leaves them at 0 forever. In the default
  # single-validator topology the one cogno-node IS the producer, so `job="cogno-node"` is correct; on a
  # multi-node scrape, relabel so this group evaluates ONLY the producer (or these will false-fire on the
  # trackers). On a Cardano-less --dev/--chain cogno-dev node the observer abstains by design, so
  # ObserverAbstaining would fire there too — don't run this group against a dev chain.
  - name: cogno-observer
    rules:
      - alert: ObserverAbstaining
        # No NON-EMPTY observation in 15m while the node keeps producing blocks → the observer is
        # abstaining (DBSYNC_URL unset, db-sync down/behind, pre-Shelley, or a runtime-API error) and the
        # talk-stake weight ledger is going stale. The counter is registered at 0 at boot, so `increase`
        # reads a flatline correctly. Weight staleness degrades the product but doesn't halt the chain.
        expr: increase(cogno_observer_observations_total{job="cogno-node"}[15m]) == 0
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "cogno observer has produced no non-empty observation in 15m — talk-stake weight is going stale (db-sync unset/down/behind?)"

      - alert: ObserverReferenceSlotStalled
        # The Cardano reference slot of the latest non-empty observation hasn't advanced in 30m — db-sync's
        # Cardano tip is FROZEN (the observer may still be crediting a stale weight snapshot). Distinct from
        # ObserverAbstaining: observations can keep succeeding against a stuck db-sync. `> 0` excludes the
        # pre-first-observation state (the gauge is 0 until the first non-empty observation). delta() (gauge).
        expr: cogno_observer_last_reference_slot{job="cogno-node"} > 0 and delta(cogno_observer_last_reference_slot{job="cogno-node"}[30m]) == 0
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "cogno observer reference slot frozen for 30m — db-sync's Cardano tip is stuck; weight is a stale snapshot"

      - alert: ObserverNoVaults
        # The observer is reading db-sync SUCCESSFULLY (observations_total climbing) but the latest
        # observation found ZERO locked-ADA vaults. On a live preprod chain (the deployed talk_vault holds
        # locked ADA) this means the vault scan broke — a wrong script hash, or a db-sync that isn't
        # tx_in-enabled / is pruned. `observations_total > 0` suppresses the genesis window before the
        # first observation. (Expected 0 on a Cardano-less dev chain and on a fresh chain before anyone
        # has locked — don't run this group against those.)
        expr: cogno_observer_observations_total{job="cogno-node"} > 0 and cogno_observer_observed_vaults{job="cogno-node"} == 0
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: "cogno observer sees 0 locked-ADA vaults while observing — vault scan broken (wrong script hash, or db-sync missing tx_in / pruned)?"

      - alert: ObserverOversize
        # THE SILENT-FREEZE PAGE. An observation's vault OR stake set EXCEEDED MaxObserved, so
        # create_inherent's `BoundedVec::try_from` drops the WHOLE inherent — the sole weight writer stops
        # updating with no other on-chain signal. increase()>0 over 15m catches even a single occurrence.
        # Fix: raise MaxObserved via a governed runtime upgrade (or page the set) — see
        # docs/IN-PROTOCOL-OBSERVATION.md. Critical, because weight is now frozen chain-wide.
        expr: increase(cogno_observer_observations_oversize_total{job="cogno-node"}[15m]) > 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "cogno observer observation EXCEEDED MaxObserved — the observe inherent is abstaining and Cardano weight is FROZEN; raise MaxObserved (governed upgrade)"

      - alert: ObserverApproachingMaxObserved
        # Early warning BEFORE the freeze: the observed set is within 10% of MaxObserved (1024). Written as
        # a ratio (division ignores __name__, so vaults/max and voters/max match on {job,instance}); before
        # the first observation both counts and max are 0, so 0/0 = NaN < 0.9 → no false pre-observe fire.
        expr: cogno_observer_observed_vaults{job="cogno-node"} / cogno_observer_max_observed{job="cogno-node"} >= 0.9 or cogno_observer_observed_voters{job="cogno-node"} / cogno_observer_max_observed{job="cogno-node"} >= 0.9
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "cogno observer set within 10% of MaxObserved — raise MaxObserved before an observation overruns it and freezes weight"

      - alert: ObserverLagHigh
        # The db-sync source is falling behind Cardano but NOT yet fully frozen (distinct from
        # ObserverReferenceSlotStalled, which needs a 30m flatline). lag_slots rides 0..StabilitySlots on the
        # healthy path (StabilitySlots=600 on this testnet) and the observer ABSTAINS once it exceeds 600, so
        # 300 (~5 min behind, half the window) warns while observations still land. On mainnet
        # (StabilitySlots=129600) scale this threshold up proportionally.
        expr: cogno_observer_lag_slots{job="cogno-node"} > 300
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "cogno observer db-sync tip is >300 Cardano slots behind (~5 min) — db-sync is falling behind; it will start abstaining past 600"

  # RPC health — from Substrate's built-in RPC middleware (substrate_rpc_*), exported on :9615 because the
  # node runs --prometheus-port. Latency/error visibility for the public relay's read surface.
  - name: cogno-rpc
    rules:
      - alert: RpcErrorRateHigh
        # A sustained RPC error rate. Errors include benign client-side faults (bad params on a hand-typed
        # call), so the threshold is high and the window long to avoid paging on noise — this is meant to
        # catch a broken client hammering the relay or an upstream fault, not the odd 4xx. Tune per traffic.
        expr: sum(rate(substrate_rpc_calls_finished{job="cogno-node",is_error="true"}[5m])) > 20
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "cogno relay RPC error rate >20/s for 15m — a broken/abusive client or an upstream fault"

  # Host metrics — REQUIRE the node-exporter scrape job (shipped commented in prometheus.yml; uncomment it
  # and run node_exporter to activate these). Until then they read no data and never fire. Disk is the one
  # that matters most: with MinAuthorities=1 the validator DB is the SOLE copy of chain history.
  - name: host
    rules:
      - alert: HostDiskFilling
        expr: node_filesystem_avail_bytes{job="node-exporter",fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{job="node-exporter",fstype!~"tmpfs|overlay|squashfs"} < 0.10
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "cogno host filesystem {{ $labels.mountpoint }} has <10% free — if this is the chain-DB mount, MinAuthorities=1 means no second copy of history"

      - alert: HostMemoryHigh
        expr: (1 - node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"}) > 0.90
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "cogno host memory >90% used for 15m"
