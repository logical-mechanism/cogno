# Minimal Alertmanager config for the cogno-chain stack (prod-readiness Phase 2). Replace the receiver
# with your real notifier (Slack/PagerDuty/email/webhook). As shipped it groups alerts and routes them
# to a single webhook placeholder — wire it to where YOU want to be paged.
#
#   alertmanager --config.file=deploy/monitoring/alertmanager.yml   # listens :9093 (see prometheus.yml)

route:
  receiver: cogno-default
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="critical"']
      receiver: cogno-default
      repeat_interval: 1h   # page critical (chain/relayer/follower down) more often

receivers:
  - name: cogno-default
    # Replace with your real notifier. Example webhook (uncomment + point at your endpoint):
    # webhook_configs:
    #   - url: "http://127.0.0.1:5001/cogno-alerts"
    # Or Slack:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
    #     channel: "#cogno-alerts"
    #     send_resolved: true
