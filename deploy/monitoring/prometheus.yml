# Prometheus scrape config for the all-Rust cogno-chain. The node is the WHOLE deployment now — one
# scrape target. Its built-in :9615/metrics endpoint carries both the substrate_* chain-health metrics
# AND the in-node cogno_observer_* gauges (node/src/metrics.rs), so there are no separate service
# targets (the relayer / follower / indexer / shadow-diff exporters are gone).
#
# Run FROM THIS DIRECTORY so the relative `rule_files: [alerts.yml]` below resolves — Prometheus loads
# rule_files relative to its WORKING DIRECTORY, not the --config.file path, so running from the repo root
# would silently load ZERO alert rules:
#
#   cd deploy/monitoring && prometheus --config.file=prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Relative to Prometheus's working directory (run from deploy/monitoring/ — see the header note).
rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["127.0.0.1:9093"]   # alertmanager.yml below

scrape_configs:
  # The Substrate node — built-in Prometheus exporter (cogno-node.service: --prometheus-port 9615).
  # Serves substrate_* (block height best/finalized, peers, …) + cogno_observer_* (observer liveness).
  # If Prometheus runs on another host, start the node with --prometheus-external (it binds localhost
  # otherwise) and reach it over your private scrape network — never expose :9615 to the public internet.
  - job_name: cogno-node
    static_configs:
      - targets: ["127.0.0.1:9615"]

  # OPTIONAL: host metrics (CPU / memory / disk / DB-mount usage). Drives the "Host …" Grafana panels and
  # the HostDiskFilling / HostMemoryHigh alerts (both inert until this job is scraping — disk is the one
  # that matters, since MinAuthorities=1 makes the validator DB the sole copy of chain history). Install:
  #   curl -sL https://github.com/prometheus/node_exporter/releases/latest/download/node_exporter-*.linux-amd64.tar.gz | tar xz
  #   ./node_exporter   # binds 127.0.0.1:9100 by default
  # then uncomment:
  # - job_name: node-exporter
  #   static_configs:
  #     - targets: ["127.0.0.1:9100"]

  # OPTIONAL: the Cardano node's own tip, to distinguish "db-sync stopped indexing" from "cardano-node is
  # behind". Compare cardano_node_metrics_slotNum_int here against cogno_observer_dbsync_tip_slot from the
  # cogno-node job. Requires cardano-node started with a Prometheus exporter on its EKG/metrics port.
  # - job_name: cardano-node
  #   static_configs:
  #     - targets: ["127.0.0.1:12798"]
