<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<!--
  cogno-maintenance-page-v1

  The charset declaration above is FIRST, before even this comment, and it has to be: a browser only scans
  the first 1024 bytes for one, and nginx serves `text/html` with no charset parameter. Push it past that
  window — which the comment you are reading, plus the base64 favicon below, would comfortably do — and a UA
  is entitled to fall back to windows-1252 and render the em dash in <title> as mojibake.

  The page nginx serves, under a 503, while /var/www/cogno-maintenance/ON exists. Deployed by
  .github/workflows/maintenance.yml; wired up by deploy/nginx/maintenance.conf.

  That first line is not a comment, it is an API: maintenance.yml's post-arm check and deploy-app.yml's
  smoke-check skip both grep the response body for `cogno-maintenance-page-v1`. They also require the
  503 status and the X-Cogno-Maintenance header — three signals, because each alone can be true for the
  wrong reason. In particular the header is set by nginx even when THIS FILE IS MISSING (add_header fires
  on @maintenance's config regardless of whether try_files found anything), so the body marker is the only
  thing that proves the page actually rendered. Don't remove it, and don't let it drift.

  THIS PAGE FETCHES NOTHING, and it has to be that way. While the flag is set, every app URL 503s —
  including /favicon.ico and /icon.png — and an app deploy during the window rewrites /var/www/cogno with
  `rsync --delete`, so any content-hashed chunk or font URL this page might have referenced is gone
  anyway. A maintenance page that depends on a second request is a maintenance page that renders broken on
  the day you need it. So: no stylesheet, no font file, no image URL. The big 😭 is a text glyph from the
  visitor's own system emoji font, and the favicon is a base64 PNG inlined in the markup below.

  Which the CSP in security-headers.conf permits, exactly: `script-src 'self' 'unsafe-inline'` and
  `style-src 'self' 'unsafe-inline'` allow the inline <style>/<script>, and `img-src … data:` allows the
  favicon. But `font-src 'self'` does NOT allow a data: webfont — so the type below is a system stack, not
  the app's Inter Tight. It is meant to look like a close cousin of the app, not a pixel match.
-->
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cogno — down for maintenance</title>
<meta name="color-scheme" content="dark light">
<meta name="robots" content="noindex,nofollow">
<!-- The app's own noindex lives in the app's document head, which this page does not inherit — it is a
     different document. Google will not index a 503 body anyway; this is the belt to that pair of braces. -->
<!-- The 😭 favicon, inlined as a base64 PNG. A data: URI SVG with the emoji as <text> would be a
     third the size, but it would depend on the renderer having an emoji font AND on the data: URL's
     charset handling for the percent-encoded codepoint. A PNG has neither dependency: it is pixels.
     `img-src 'self' data:` in the CSP is what permits it. Same glyph as the app's own tab icon
     (app/src/app/icon.png), rasterized from Noto Color Emoji. -->

<!-- Match the theme the visitor already chose in the app. Same storage key ('cg-theme'), same values, and
     the same dark default as app/src/app/layout.tsx's boot script — so someone who set light mode does not
     get flashbanged by an outage page. Runs before first paint, like the app's does. -->
<script>(function(){try{var t=localStorage.getItem('cg-theme');if(t!=='light'&&t!=='dark')t='dark';document.documentElement.dataset.theme=t;}catch(e){document.documentElement.dataset.theme='dark';}})();</script>

<style>
  /* Colors lifted from app/src/styles/tokens.css so this reads as the same product. If the app's palette
     ever moves, this is a copy and will not follow it — which is fine, and the reason it is only six values. */
  :root, [data-theme="dark"] {
    --bg: #000000;
    --text: #e7e9ea;
    --text-secondary: #71767b;
    --border: #2f3336;
    --surface: #16181c;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --text: #0f1419;
    --text-secondary: #536471;
    --border: #eff3f4;
    --surface: #f7f9f9;
  }

  * { box-sizing: border-box; margin: 0; }

  html, body { height: 100%; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  main {
    width: 100%;
    max-width: 420px;
    padding: 40px 32px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    text-align: center;
  }

  .face {
    font-size: 56px;
    line-height: 1;
    /* An emoji font stack, so the glyph is the real colour emoji rather than a monochrome fallback box. */
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  }

  h1 {
    margin-top: 20px;
    font-size: 23px;
    line-height: 1.25;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  p {
    margin-top: 10px;
    color: var(--text-secondary);
    text-wrap: balance;
  }

  @media (prefers-reduced-motion: no-preference) {
    main { animation: rise 220ms ease-out both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
  }
</style>
</head>
<body>
  <main>
    <div class="face" role="img" aria-label="Loudly crying face">&#128557;</div>
    <h1>cogno is down for maintenance</h1>
    <p>We&rsquo;re working on it. Check back shortly.</p>
  </main>
</body>
</html>
