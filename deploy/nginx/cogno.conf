# nginx for the cogno relay droplet: TLS termination for the node's wss:// RPC, plus the static
# frontend, on one host and one certificate.
#
# Serving both from the same origin is not just tidy — it means the app talks to wss://<host>/rpc,
# same-origin, and the browser never has to be told about a second host.
#
#   browsers ──https/wss──▶ nginx :443 ──┬── /rpc ──▶ 127.0.0.1:9944  (cogno-relay.service)
#                                        └── /    ──▶ /var/www/cogno  (app/out, rsynced by CI)
#
# Install. Get the certificate FIRST: this vhost hardcodes its cert paths (below), so `nginx -t` fails
# until they exist — and `certbot --nginx` cannot fix a vhost that will not load.
#   mkdir -p /var/www/certbot
#   systemctl stop nginx && certbot certonly --standalone -d <your-domain> && systemctl start nginx
#   cp deploy/nginx/cogno.conf /etc/nginx/sites-available/cogno.conf
#   install -m 0644 deploy/nginx/security-headers.conf /etc/nginx/security-headers.conf
#   install -m 0644 deploy/nginx/maintenance.conf      /etc/nginx/maintenance.conf
#   install -d -o cogno -g cogno -m 0755 /var/www/cogno-maintenance
#   ln -s /etc/nginx/sites-available/cogno.conf /etc/nginx/sites-enabled/
#   sed -i 's/cogno.example.io/<your-domain>/g' /etc/nginx/sites-available/cogno.conf
#   nginx -t && systemctl reload nginx
#   certbot certonly --webroot -w /var/www/certbot -d <your-domain>   # renewals: no more downtime
#
# Both `include`d files above are MANDATORY, and a literal (non-wildcard) include of a missing file is a
# FATAL config error. Copy a newer cogno.conf to the box without also installing its sidecars and
# `nginx -t` fails: a reload is merely refused, so the running nginx survives and the site looks fine —
# but certbot's unattended renewal hook reloads twice a day and starts failing silently, and you find out
# ~60 days later when the certificate expires for real. Install the sidecars in the same breath as the
# vhost. And do NOT paper over it with a wildcard `include …/maintenance.conf*;` — that tolerates the
# missing file, which converts a loud config error into a maintenance switch that is silently not wired
# up, i.e. a site you believe is dark and isn't.
#
# The app must then be BUILT with NEXT_PUBLIC_WS_URL=wss://<your-domain>/rpc — endpoints.ts refuses
# a production build without it.

# WebSocket upgrade plumbing. `sites-enabled/*` is included inside http{}, so these belong here.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Bound an anonymous caller. The node's own --rpc-rate-limit is the backstop; this is the front one.
limit_req_zone  $binary_remote_addr zone=rpc_req:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=rpc_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name cogno.example.io;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    # HTTP/2 via the listen parameter, not the standalone `http2 on;` directive — the latter needs
    # nginx >= 1.25.1, and Ubuntu 24.04 ships 1.24.0. This form works on both (deprecated, not removed,
    # on newer nginx).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cogno.example.io;

    ssl_certificate     /etc/letsencrypt/live/cogno.example.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cogno.example.io/privkey.pem;

    # The vhost hardcodes its cert paths, so certbot's `options-ssl-nginx.conf` include may never land
    # here. Set the TLS floor ourselves rather than inherit whatever the distro default is.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    root /var/www/cogno;
    index index.html;

    # nginx's add_header does NOT accumulate across levels: a location that declares ANY add_header
    # discards every add_header inherited from here. Every content location below sets its own
    # Cache-Control, so each must re-include this snippet — that is what keeps every copy identical. (Don't
    # count them here: this comment used to say "six", and adding @maintenance quietly made it a lie.)
    include /etc/nginx/security-headers.conf;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── the node's RPC, as wss:// ────────────────────────────────────────────────────────
    # The trailing slash on proxy_pass strips the /rpc prefix, so the node sees "/".
    #
    # THIS LOCATION DELIBERATELY CARRIES NO MAINTENANCE GUARD. Maintenance mode takes the APP down, not
    # the chain: /rpc keeps answering for the whole window. Two concrete reasons, both of which bite
    # immediately if you "fix" it by adding the include here or hoisting it to server level —
    #   • deploy-node.yml's closing step POSTs system_health to the PUBLIC https://<host>/rpc and hard-fails
    #     on it. A 503 here turns every node deploy red at the very last step, after the binary is already
    #     installed and the relay restarted.
    #   • the operator needs RPC through the window: `cogno-chain-cli` drives committee motions and runtime
    #     upgrades over exactly this endpoint, and a maintenance window is when you are using it most.
    # An open tab that survives into a window keeps reading a healthy chain, which is fine — it gets the
    # maintenance page the moment it navigates (the RSC payload 503s, and Next falls back to a document load).
    location ^~ /rpc {
        proxy_pass http://127.0.0.1:9944/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The node runs --rpc-rate-limit-trust-proxy-headers, and it keys the limiter on the REMOTEST
        # (leftmost) forwarded address, preferring `Forwarded` over `X-Forwarded-For`
        # (sc-rpc-server/src/utils.rs: remotest_forwarded_for_ip). $proxy_add_x_forwarded_for APPENDS
        # to whatever the client sent, so a caller could prepend a fake IP and be rate-limited as that
        # IP instead of their own. Overwrite rather than append, and drop any `Forwarded` the client
        # supplied (nginx passes unknown request headers upstream untouched) — otherwise it wins.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "";

        # PAPI holds long-lived subscriptions (chainHead follow, watchValue). nginx's 60s default
        # would sever every one of them on any lull, and every visitor would reconnect at once.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;

        # Body cap for the HTTP-POST JSON-RPC path only. This does NOT gate the runtime upgrade: the
        # 0x-hex WASM extrinsic (`cogno-chain-cli upgrade apply`) is submitted as a WebSocket subscription
        # (`author_submitAndWatchExtrinsic`), and nginx applies client_max_body_size to HTTP request
        # bodies, not WS frames — so the upgrade never touches this limit. That ceiling is the node's
        # --rpc-max-request-size (which the SDK applies to BOTH HTTP and WS), set to 8 MB in the relay
        # unit. This directive only bounds a one-shot HTTP poster (e.g. `curl author_submitExtrinsic`),
        # where nginx's 1m default would 413 a large body; 8m keeps it aligned with the node cap so the
        # two agree. Raise the node's --rpc-max-request-size (not this alone) before a compressed runtime
        # approaches ~3.5 MB (~7 MB hex body); keep this in step for the HTTP path.
        client_max_body_size 8m;

        # Per-IP, and one visitor holds one long-lived socket. Behind CGNAT (mobile carriers, offices)
        # many real visitors share one egress IP, so a tight cap silently locks them out rather than
        # stopping an attacker. Generous here; the node's --rpc-max-connections is the real ceiling.
        limit_req  zone=rpc_req burst=120 nodelay;
        limit_conn rpc_conn 128;

        # Both limiters reject with 503 by DEFAULT, and that collides with maintenance mode: the moment
        # anyone maps 503 to the maintenance page anywhere this location can see, a caller who merely
        # tripped the rate limit gets handed a full "we are down for maintenance" HTML page instead of a
        # throttle response — and, being a 503, it looks identical to a real outage. 429 is the correct
        # code for a throttled caller anyway (503 means "the server is unavailable", which is a lie: it is
        # available, the CALLER is over budget), so this is not a workaround, it is the right status. Keep
        # it, and do not turn on `proxy_intercept_errors` here — that would route the NODE's own 5xx through
        # error_page too, reintroducing the same collision from the upstream side.
        limit_req_status  429;
        limit_conn_status 429;
    }

    # ── maintenance mode ────────────────────────────────────────────────────────────────
    # Reached only by `error_page 503` from the guarded locations below (a named location is unreachable
    # by URL), so there is nothing to guard here and no way to loop.
    #
    # try_files is doing real work, not decoration: a named location does NOT rewrite $uri, so it is still
    # /post/123/ when we arrive. A plain root+index would go looking for
    # /var/www/cogno-maintenance/post/123/index.html and 404. try_files rewrites the URI to /index.html in
    # place — which also re-derives the extension, so the response gets Content-Type: text/html. The `=503`
    # tail is the fail-closed arm: if the page is somehow missing, you get nginx's built-in 503 rather than
    # the site. (No recursion: recursive_error_pages is off by default and nginx latches error_page after
    # one substitution. Never turn it on — with a 503 mapping visible here that becomes a redirect cycle.)
    #
    # `always` on both add_headers is load-bearing, not habit. nginx's header filter drops non-`always`
    # headers on any status outside its whitelist (200/201/204/206/301/302/303/304/307/308), and 503 is not
    # on it — so without `always` every header here would vanish from the maintenance response, INCLUDING
    # the whole CSP/HSTS set, leaving a framable page on the origin where visitors sign wallet messages.
    # The security-headers include is mandatory for the same reason it is everywhere else: this location
    # declares its own add_headers, which discards the server block's set.
    #
    # no-store, not no-cache: the guard also fires on RSC payload paths, and a cacheable 503 sitting in a
    # returning visitor's cache would outlive the window.
    location @maintenance {
        root /var/www/cogno-maintenance;
        try_files /index.html =503;

        # The machine-readable marker. maintenance.yml and deploy-app.yml both key on it, and they need it
        # in a HEADER rather than only in the body because a probe that discards the body (-o /dev/null)
        # cannot grep for anything. 503 ALONE is not enough to key on — nginx emits a bare 503 when the page
        # itself is missing, and an upstream can emit one too — so the checks require the status AND this
        # header AND a marker in the body. All three, because each one alone can be true for the wrong reason.
        add_header X-Cogno-Maintenance 1 always;
        add_header Retry-After 120 always;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/security-headers.conf;
    }

    # ── the static export ───────────────────────────────────────────────────────────────
    # Content-hashed, so it can never go stale. (Headers re-included: see the note in the server block.)
    #
    # NOT maintenance-guarded, deliberately. Nobody enters the site through a content-hashed chunk URL, so a
    # guard here buys nothing — and it costs: a visitor whose tab was already open, lazily importing a route
    # chunk, would get a 503 and therefore a ChunkLoadError, which surfaces as the app's crash screen. That
    # reads as a BUG, not as planned maintenance. Leaving chunks reachable lets an open tab keep working
    # until it navigates, at which point the HTML/RSC 503 hands it the maintenance page cleanly.
    #
    # This only holds while the chunks are still THERE. Deploy the app during a window and its
    # `rsync --delete` prunes the old ones, so that same tab's lazy import 404s, the server-level
    # `error_page 404` redirects it into the guarded `location /`, and it gets a 503 anyway (nginx's own,
    # not the page — recursive_error_pages is off, so the 503 mapping cannot fire a second time). The tab
    # ends up with a ChunkLoadError regardless. Nothing to fix — a deleted chunk is gone either way — but
    # don't be surprised by it, and don't conclude the guard leaked.
    location ^~ /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Dynamic routes under `output: 'export'` are NOT prerendered per-id. generateStaticParams emits
    # one placeholder shell each — /post/_/ and /u/_/ — and the real id is read client-side off the URL
    # (see app/src/lib/routeSegment.ts). So a deep link to /post/123/ must be served that shell, not a
    # 404. Serving $uri here would 404 every deep link.
    #
    # A shell is TWO artifacts, not one, and BOTH must be mapped:
    #
    #   index.html      the document — a cold deep link / a hard load
    #   *.txt           the RSC flight payload + Next 16's per-segment prefetch files (index.txt,
    #                   __next._tree.txt, __next.u.$d$address.__PAGE__.txt, …) — what the CLIENT router
    #                   fetches on a <Link> click or router.push()
    #
    # Mapping only the document is the trap: the app looks fine on a cold load, but every in-app click
    # through to a profile or a thread fetches /u/<addr>/index.txt, gets a 404, and Next silently falls
    # back to a FULL DOCUMENT LOAD (an MPA navigation). That reboots the SPA — and since the posting key
    # is derived from a wallet signature and held in memory only, a reboot logs the user out and the
    # auth wall bounces them to /welcome. The .txt rules below are what keep navigation client-side.
    #
    # $1 is the filename, so any future segment-prefetch file is covered without touching this again.
    #
    # Cache-Control is re-stated in all four (see the add_header note in the server block): a shell
    # response with NO Cache-Control is heuristically cacheable off Last-Modified, and a stale payload
    # outlives the content-hashed chunks it names — `rsync --delete` removes those on the next deploy,
    # so a returning visitor would navigate into 404'd chunks. These must be no-cache like `location /`.
    #
    # The maintenance include is what makes each of these answer 503 while the flag is set; it runs in the
    # REWRITE phase, several phases before try_files, so it short-circuits cleanly. Note the $1 capture:
    # the maintenance guard is a FILE test, which never touches $1. If anyone ever changes that `if` to a
    # REGEX condition, it would overwrite the captures, `try_files /u/_/$1` would collapse to `try_files
    # /u/_/`, and every in-app navigation would break — which is precisely the SPA-reboot/logout bug the
    # four locations below exist to prevent. Keep it a file test.
    location ~ ^/post/[^/]+/([^/]+\.txt)$ {
        include /etc/nginx/maintenance.conf;
        try_files /post/_/$1 =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }
    location ~ ^/u/[^/]+/([^/]+\.txt)$ {
        include /etc/nginx/maintenance.conf;
        try_files /u/_/$1 =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }

    location ~ ^/post/[^/]+/?$ {
        include /etc/nginx/maintenance.conf;
        try_files /post/_/index.html =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }
    location ~ ^/u/[^/]+/?$ {
        include /etc/nginx/maintenance.conf;
        try_files /u/_/index.html =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }

    # trailingSlash: true — every other route is a real directory with an index.html. There is no SPA
    # shell to fall back to: this is a static export, and /index.html is the home page's own bundle, not
    # a router that would re-resolve the typed path. So a final `/index.html` fallback would answer every
    # mistyped URL with 200 + the feed, and `error_page 404` below would never fire. End with =404.
    location / {
        include /etc/nginx/maintenance.conf;
        try_files $uri $uri/index.html $uri.html =404;
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }

    # Server level, so it is inherited by every location that does not declare an error_page of its own —
    # which, since maintenance.conf landed, is only /_next/static/ and /rpc. The five app locations get
    # their copy of this line from maintenance.conf, which has to re-state it (error_page does not
    # accumulate across levels). If you change the 404 target, change it in BOTH places.
    error_page 404 /404.html;
}
