# The maintenance switch, included by cogno.conf into every location that serves the APP — and into no
# other. Taking the site down is then a matter of putting ONE FILE on the droplet:
#
#     /var/www/cogno-maintenance/ON      present  -> every app URL answers 503 with the page below it
#                                        absent   -> the site serves normally
#
# nginx stats that path per request, so the toggle is instant: no reload, no restart, no root, and the
# node underneath never notices. `.github/workflows/maintenance.yml` is what puts the file there and
# takes it away, from the Actions tab, without anyone SSHing into the box.
#
# Install alongside the vhost:
#   sudo install -m 0644 deploy/nginx/maintenance.conf /etc/nginx/maintenance.conf
#   sudo install -d -o cogno -g cogno -m 0755 /var/www/cogno-maintenance
#
# WHY THE FLAG LIVES IN ITS OWN DIRECTORY, and not in /var/www/cogno with the site: deploy-app.yml
# rsyncs the docroot with `--delete`. A flag inside it would be deleted by the next app deploy — which
# is the one thing you are most likely to do DURING a window — and the site would pop back live, in the
# middle of whatever you took it down for, with nothing anywhere reporting it. The separate directory
# turns that silent lift into a loud permission error. Do not tidy the flag into the docroot.
#
# WHY THIS FILE IS INCLUDED ONCE PER APP-SERVING LOCATION (five of them, today) rather than written a single
# time at server level: see footgun 1, and the identical note at the top of security-headers.conf. nginx
# inherits `error_page` all-or-nothing per level — a location that declares one discards every error_page it
# would otherwise inherit, and there is no syntax for "add to the inherited set". So the set has to be
# re-stated wherever it is touched.
#
# ── Four edits that will silently break this, every one of which looks like an improvement ─────────
#
# 1. NEVER include this file at SERVER level. A server-level `if` runs in the SERVER_REWRITE phase,
#    before nginx has chosen a location — so it would 503 `/rpc` along with everything else. That kills
#    the carve-out that deliberately keeps the node's RPC reachable during a window (see cogno.conf), and
#    it would turn deploy-node.yml's closing system_health probe red AFTER the binary is installed and the
#    relay restarted, with an error message sending you to look at nginx instead of at this file.
#
# 2. NEVER write `error_page 503 = @maintenance;`. The `=` rewrites the status to whatever the named
#    location produces — a 200 OK. The maintenance page would then tell every uptime monitor, crawler and
#    `curl -f` that the site is perfectly healthy. This is a very easy "fix" to introduce, because nginx's
#    own documentation uses the `=` form in its worked example (`error_page 404 = @fallback;`). Without the
#    `=`, the 503 is preserved and the page renders underneath it, which is the whole point.
#
# 3. NEVER write `return 503 "down for maintenance";`. A text argument makes nginx send that string as the
#    entire response body and skip `error_page` altogether — you would serve one line of text/plain and
#    never see the page again. Only a bare `return 503;` routes through @maintenance.
#
# 4. The `error_page 404` line below is NOT redundant, and deleting it is the trap this whole comment
#    exists for. cogno.conf sets `error_page 404 /404.html;` at server level. Because this file adds an
#    error_page at LOCATION level, that inherited 404 mapping is discarded — so without re-stating it,
#    every mistyped URL on the site would start answering with nginx's built-in beige 404 instead of the
#    app's, permanently, in normal operation, with maintenance OFF. Nobody would ever connect the two.
#    (Directives at the SAME level accumulate. It is only ACROSS levels that they replace.)

error_page 404 /404.html;
error_page 503 @maintenance;

# `-f` compiles to a stat(), not an open() — so nginx's worker needs search (+x) on /var/www/cogno-maintenance
# but no read permission on the flag itself. Mind the failure shape if the directory mode is wrong (0750
# looks perfectly reasonable): the stat fails, `-f` evaluates FALSE, and the guard silently never fires —
# the site stays live while you believe it is dark and start pulling the node apart. maintenance.yml
# re-checks over HTTPS after arming, and refuses to leave a flag it could not see take effect, precisely
# because this fails open.
#
# This is reload-free only because `open_file_cache` is off — nginx's default, and nothing in deploy/ turns
# it on. It lives in nginx.conf's http{} block, outside this repo. If it is ever enabled, the positive stat
# is cached for `open_file_cache_valid` (60s by default) and turning maintenance OFF would lag by up to a
# minute — long enough for the workflow's own post-lift check to flap.
if (-f /var/www/cogno-maintenance/ON) {
    return 503;
}
