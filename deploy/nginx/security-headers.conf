# Response headers for cogno.conf, kept in ONE place because nginx's add_header does not accumulate:
# a location that declares any add_header discards every add_header inherited from the server block. So
# every location that sets its own Cache-Control must also re-state these — an `include` is the only way
# to do that without six copies drifting apart.
#
# Install alongside the vhost:  sudo install -m 0644 deploy/nginx/security-headers.conf /etc/nginx/security-headers.conf
#
# This origin asks visitors to sign a Cardano message with a browser wallet, and the signature
# deterministically derives their posting key (app/src/lib/signer/wallet-derive.ts). So the two things
# that matter most here are: nobody may frame this page (a clickjacked wallet approval), and no
# third-party script may run on it (it would see the signature before it is hashed).

add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy strict-origin-when-cross-origin always;

# TLS only, once seen. The :80 -> :443 redirect is strippable on a first, plaintext contact; this closes
# every visit after it. Add `preload` (and submit to hstspreload.org) only if you are sure — it is hard
# to undo, and it commits every current and future subdomain to HTTPS.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# frame-ancestors 'none' is the real control (CSP below); X-Frame-Options is the legacy belt-and-braces.
add_header X-Frame-Options DENY always;

# CSP, scoped so it does NOT break the app. What each loosening buys, and why it cannot simply be
# tightened:
#
#   script-src 'unsafe-inline'  Next's static export (`output: 'export'`) inlines its RSC bootstrap as
#                               <script>self.__next_f.push(...)</script>. There is no server to stamp a
#                               nonce, so nonces are not available to a static export.
#   script-src 'wasm-unsafe-eval'
#                               the bundle instantiates WebAssembly (MeshJS core-cst's UPLC apply-params,
#                               and sr25519 in the signer path). Without this, Chrome blocks
#                               WebAssembly.instantiate outright and the wallet/lock path dies.
#   connect-src *               the RPC endpoint is user-overridable by design
#                               (app/src/lib/config/endpoints.ts: "the user picks who they trust to
#                               read/broadcast through"). Pinning this to the operator's own relay would
#                               take that away. An operator who wants it pinned can narrow it here — that
#                               is a deployment choice, not the template's default.
#   img-src https: data: blob:  posts, avatars, and banners are arbitrary remote image URLs.
#   style-src 'unsafe-inline'   Next injects inline <style> in the export.
#
# CIP-30 wallets are browser extensions: they inject `window.cardano` from an isolated content script,
# which is not subject to the page's CSP, so this policy does not block wallet discovery or signing.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src *; frame-ancestors 'none'; base-uri 'none'; object-src 'none'; form-action 'none'" always;
