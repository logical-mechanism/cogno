version: 2
updates:
  # Rust workspace
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (keeps the SHA-pinned actions current)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    ignore:
      # The `dtolnay/rust-toolchain@<ver>` ref IS the rustc version, and rustc is pinned to 1.93.0
      # (rust-toolchain.toml) — the toolchain the polkadot-sdk stable2606 train is built against.
      # Never auto-bump it; it must track the SDK release, not float to latest stable.
      - dependency-name: "dtolnay/rust-toolchain"

  # Frontend
  - package-ecosystem: npm
    directory: "/app"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # CIP-8 adversarial oracle (pinned Python deps)
  - package-ecosystem: pip
    directory: "/ci/cip8-oracle"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
