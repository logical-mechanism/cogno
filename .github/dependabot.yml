version: 2
updates:
  # Rust workspace
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (keeps the SHA-pinned actions current)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

  # Frontend
  - package-ecosystem: npm
    directory: "/app"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # CIP-8 adversarial oracle (pinned Python deps)
  - package-ecosystem: pip
    directory: "/ci/cip8-oracle"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
