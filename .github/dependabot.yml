version: 2

# CI-cost posture. Dependabot was 30% of the CI bill (1016 min/mo) and had merged exactly zero PRs
# — every bump lands by hand on a `chore/deps-*` branch, so these PRs are a NOTIFICATION channel,
# not a merge pipeline. They are therefore batched (`groups`) and slowed to the cadence each
# ecosystem actually moves at.
#
# Safety net: this only holds because Dependabot ALERTS + SECURITY UPDATES are enabled in repo
# settings. Security PRs are raised by an alert, not by `schedule` — they ignore `interval`,
# ignore `open-pull-requests-limit`, and are NOT suppressed by the `ignore:` blocks below (per
# GitHub's options reference, `ignore` / `update-types` apply to VERSION updates only). A CVE
# still opens a PR the day it lands, whatever the interval says.

updates:
  # ── Rust workspace ────────────────────────────────────────────────────────────────────────────
  # The expensive one: a Cargo.lock change misses the rust-cache key, so every cargo PR is a cold
  # ~27-min workspace build. ONE grouped PR per month instead of six weekly singletons.
  #
  # Majors are deliberately IN the group: the polkadot-sdk crates are major-versioned and must move
  # as a train (sp-runtime 46→48, pallet-session 46→49 … were all majors). Splitting majors out
  # would put each SDK crate back in its own 27-min PR — exactly the thing this is fixing.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo:
        patterns: ["*"]
        update-types: [major, minor, patch]
    ignore:
      # jsonrpsee is pinned to the 0.24.x line the polkadot-sdk stable2606 RPC layer
      # (sc-rpc / substrate-frame-rpc-system) is built against — see the note at Cargo.toml.
      # crates.io ships 0.26.x but its API is incompatible with the SDK's RPC traits, so it
      # must move with the SDK train, not float to latest. Don't auto-bump it.
      - dependency-name: "jsonrpsee"

  # ── Frontend ──────────────────────────────────────────────────────────────────────────────────
  # Highest-churn ecosystem (14 PRs in 30 days) but the cheapest to test. Minors/patches ride one
  # grouped monthly PR; MAJORS stay ungrouped on purpose — next 14→16, react 18→19, polkadot-api
  # 1→2 are the bumps that actually need eyes, and a lone red major must not redden (and hide) the
  # safe train next to it.
  #
  # NOTE for path-filtering: app/package-lock.json is an input to BOTH the `frontend` AND the
  # `cip8-oracle` job (the oracle npm-ci's app/ for the headless MeshJS signing fixture). A filter
  # that maps app/** to `frontend` only will wrongly skip the oracle.
  - package-ecosystem: npm
    directory: "/app"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      app-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      # eslint is held on the 9.x line: eslint-config-next@16 (Next 16's flat config) bundles
      # eslint-plugin-react / -import / -jsx-a11y whose peer range caps at `eslint ^9`, and
      # eslint 10 removed `scopeManager.addGlobals`, which those plugins call — so `eslint .`
      # dies with `TypeError: scopeManager.addGlobals is not a function` under 10.x. Stay on 9.x
      # until eslint-config-next ships eslint-10-ready plugins; patches/minors within 9.x still flow.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

      # typescript is held on the 6.x line. TS 7 is the native (Go) rewrite, and its npm package no
      # longer exports the JS compiler API — `ts.Extension`, `ts.ScriptKind` and `ts.ModuleKind` are
      # all undefined under 7.0.2. Anything that reads that API breaks: @typescript-eslint (bundled
      # by eslint-config-next@16, peer range `>=4.8.4 <6.1.0`) dies on load reading `ts.Extension.Cjs`
      # — `TypeError: Cannot read properties of undefined (reading 'Cjs')` — so `eslint .` fails, and
      # `next build` fails too. Only vitest survives, because it strips types instead of checking
      # them, which means a green test run says nothing here. Stay on 6.x until typescript-eslint
      # supports TS 7 and eslint-config-next picks it up; patches/minors within 6.x still flow.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ── Acceptance script ─────────────────────────────────────────────────────────────────────────
  # A second npm root (scripts/acceptance/, one dep: @polkadot/api) that the `/app` entry above does
  # NOT cover — a Dependabot directory is not recursive. It is a dev-only script and nothing ships
  # from it, so quarterly is plenty; it is here so the lockfile is not simply unwatched.
  - package-ecosystem: npm
    directory: "/scripts/acceptance"
    schedule:
      interval: quarterly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(deps)"
    groups:
      acceptance:
        patterns: ["*"]
        update-types: [major, minor, patch]

  # ── CIP-8 adversarial oracle (pinned Python deps) ─────────────────────────────────────────────
  # Three pinned deps behind a CI-only oracle; nothing here ships. Quarterly, one grouped PR.
  - package-ecosystem: pip
    directory: "/ci/cip8-oracle"
    schedule:
      interval: quarterly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(deps)"
    groups:
      cip8-oracle:
        patterns: ["*"]
        update-types: [major, minor, patch]
    ignore:
      # cbor2 is held on the 5.x line: beacon.py's Plutus-Data CBOR of the owner Address must stay
      # byte-identical to the Aiken beacon-name / identity hash (the LOCKED value in test_beacon.py
      # is the guard), and cbor2 6.x could change encoding behaviour. Requirements pin `>=5.6,<6`;
      # stay there until a 6.x bump is verified byte-for-byte. Patches/minors within 5.x still flow.
      - dependency-name: "cbor2"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ────────────────────────────────────────────────────────────────────────────
  # Every THIRD-PARTY action is SHA-pinned (dorny/paths-filter, Swatinem/rust-cache, aiken-lang/
  # setup-aiken, dtolnay/rust-toolchain, EmbarkStudios/cargo-deny-action) — a mutable tag on a
  # third-party action is the tj-actions/changed-files footgun, and two of them run in the job that
  # holds DEPLOY_SSH_KEY. GitHub's own actions/* stay on major tags.
  #
  # Consequence for the cadence: a SHA pin does not float, so Dependabot proposes EVERY patch here,
  # not just majors. That makes this entry busier than it was — hence the group, and hence quarterly.
  # A CVE in an action still opens a security PR the day it lands, whatever this says.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: quarterly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns: ["*"]
        update-types: [major, minor, patch]
    ignore:
      # The `dtolnay/rust-toolchain` pin IS the rustc version (the SHA is tagged 1.93.0), and rustc is
      # pinned to 1.93.0 in rust-toolchain.toml — the toolchain the polkadot-sdk stable2606 train is
      # built against. Never auto-bump it; it must move with the SDK release, not to latest stable.
      # Re-pin it BY HAND, to the SHA of the tag matching the new rustc, on an SDK bump.
      - dependency-name: "dtolnay/rust-toolchain"
