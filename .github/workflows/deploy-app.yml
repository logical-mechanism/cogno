name: deploy-app

# MANUAL deploy of the static frontend to the relay droplet. Trigger it from the Actions tab
# ("Run workflow") and pick the branch/tag to deploy — nothing here fires on push, so `main` stays a
# free-to-push work branch that never auto-deploys. CI (ci.yml) still lints/tests/builds on push + PR;
# this workflow is the only thing that ships to production, and only when you click it.
#
# The static export embeds no Rust artifact — its PAPI descriptors regenerate offline from the
# committed app/.papi/metadata/cogno.scale — so this builds from source with no dependency on the node
# binary. Its sibling deploy-node.yml ships the node binary to the same box.
#
# Deploying while the site is parked behind the maintenance page (Actions -> maintenance -> state: on) is
# a normal, intended thing to do — it is most of the reason maintenance mode exists. The bundle ships as
# usual; the only difference is that the SPA-shell smoke check at the end SKIPS with a warning, because
# every URL it probes answers 503 by design. Those checks then run when you take the site back out
# (state: off). See deploy/README.md, "Maintenance mode".
#
# Requires, in repo Settings → Secrets and variables → Actions:
#   vars.NEXT_PUBLIC_WS_URL                    wss://cogno.forum/rpc  (a Variable; the build refuses non-wss)
#   secrets.NEXT_PUBLIC_BLOCKFROST_PROJECT_ID  preprod project id     (inlined into the bundle by design;
#                                                                      a Secret only to keep it out of git)
#   secrets.DEPLOY_HOST                        157.230.53.66
#   secrets.DEPLOY_USER                        the droplet deploy user (e.g. cogno)
#   secrets.DEPLOY_SSH_KEY                     an ed25519 PRIVATE key, no passphrase (its pubkey in the
#                                              droplet's authorized_keys)
#   secrets.DEPLOY_KNOWN_HOSTS                 `ssh-keyscan 157.230.53.66` output — pins the host key
#
# Harden the deploy key in the droplet's ~cogno/.ssh/authorized_keys so a leak can't become a shell:
#   restrict ssh-ed25519 AAAA...
# (`restrict` = no pty, no port/agent/X11 forwarding.) Give DEPLOY_USER write to /var/www/cogno only.

on:
  workflow_dispatch:

permissions:
  contents: read

# Serialize deploys so two manual runs can't interleave a `--delete` rsync against the live tree.
concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      # Checks out the ref you selected in "Run workflow" (defaults to the branch you launched from),
      # so you deploy exactly what you point at — main, a release tag, or a feature branch.
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: install deps (retry transient npm network errors)
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci attempt $i/3 failed; retrying in 15s"
            sleep 15
          done
          exit 1
      # endpoints.ts exempts loopback so a dev can build for a local `serve out`. That exemption must
      # not reach a public deploy: a vars.NEXT_PUBLIC_WS_URL of ws://127.0.0.1:9944 would build green and
      # ship a bundle every visitor resolves to their own machine, and nothing downstream can catch it
      # (the dev-fallback literal is in the bundle either way). Assert wss:// before the build, on the
      # string. Empty also fails (`-qF ""` matches everything).
      - name: the deployed endpoint must be wss://
        env:
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
        run: |
          case "$NEXT_PUBLIC_WS_URL" in
            wss://?*) echo "endpoint: $NEXT_PUBLIC_WS_URL" ;;
            *) echo "::error::vars.NEXT_PUBLIC_WS_URL must be a wss:// URL (got '${NEXT_PUBLIC_WS_URL:-<unset>}')"; exit 1 ;;
          esac
      - name: build (static export, pointed at the live relay)
        env:
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_BLOCKFROST_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_BLOCKFROST_PROJECT_ID }}
        run: npm run build
      # Assert the endpoint we configured is the one that got inlined. We do NOT check for the absence of
      # "127.0.0.1:9944": that dev-fallback literal survives minification even in a wss:// build (verified)
      # and is simply unreachable once the guard passes. The wss URL's presence is what proves the build.
      - name: sanity-check the bundle before it replaces the live site
        env:
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
        run: |
          test -f out/index.html || { echo "::error::out/index.html missing — refusing to deploy"; exit 1; }
          grep -rqF "$NEXT_PUBLIC_WS_URL" out/_next/static/chunks/ || {
            echo "::error::configured endpoint '$NEXT_PUBLIC_WS_URL' is not in the bundle"
            exit 1
          }
      - name: authorize ssh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
      # `--delete` prunes anything on the droplet that is not in this build — which is what keeps stale
      # chunks from outliving the bundle that named them. It is also why the maintenance switch
      # (/var/www/cogno-maintenance/ON) lives OUTSIDE this docroot, in its own directory. Do not "tidy" it
      # in here: this rsync would delete the flag, and since deploying the app is the thing you are most
      # likely to do DURING a maintenance window, the site would silently come back up in the middle of it.
      # A separate directory makes that impossible. See deploy/nginx/maintenance.conf.
      - name: rsync out/ -> /var/www/cogno
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e 'ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes' \
            out/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/cogno/"

      # A dynamic route's SPA shell is TWO artifacts, and nginx has to map BOTH: the document (a cold
      # deep link) and the RSC payload the CLIENT router fetches on a <Link> click. Mapping only the
      # document is invisible on a cold load but 404s /u/<addr>/index.txt on every in-app click — and
      # Next answers a 404 payload with a FULL DOCUMENT LOAD, which reboots the SPA and destroys the
      # in-memory wallet session (the posting key is never persisted). That is exactly the bug this
      # check exists to keep dead. nginx is NOT deployed by this workflow, so without this the site can
      # regress silently whenever deploy/nginx/cogno.conf is newer than what the droplet has loaded.
      - name: smoke-check the SPA shell — document AND RSC payload
        env:
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
        run: |
          origin="$(printf '%s' "$NEXT_PUBLIC_WS_URL" | sed -E 's#^wss://([^/]+).*#https://\1#')"
          addr=5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY
          fail=0
          hdr="$RUNNER_TEMP/h"; body="$RUNNER_TEMP/b"

          # Is the site parked behind the maintenance page? Then every URL below answers 503 and this check
          # cannot run. Deploying the app while the site is parked is a NORMAL, intended thing to do — it is
          # most of the reason maintenance mode exists — so that is a skip, not a failure.
          #
          # This gets its OWN curl, with NO --retry, and that is the whole reason it is a separate function.
          # The maintenance page sets `Retry-After: 120` (deploy/nginx/cogno.conf), and curl OBEYS a
          # server-sent Retry-After IN PREFERENCE TO --retry-delay — verified on curl 8.5.0, the runner's
          # version: `--retry 2 --retry-delay 1` against a 503 carrying `Retry-After: 6` slept 12s, not 2s.
          # Probing a parked site with `--retry 3` therefore burns ~SIX MINUTES on one URL, and this job's
          # timeout is 15. The retrying probe() below must never be the thing that first meets a 503.
          #
          # `-o "$body"`, never /dev/null: curl truncates the output sink to rewind for a retry, /dev/null
          # cannot be truncated, and curl then dies with CURLE_WRITE_ERROR while `-w` prints nothing at all.
          # `|| true`, never `|| echo 000`: `-w '%{http_code}'` already prints `000` itself on a transport
          # failure, so `|| echo 000` CONCATENATES into `000000` (or `503000` when the transfer dies after the
          # headers land) and compares equal to nothing.
          #
          # Status AND header AND body marker, all three, every time this is asked. A bare 503 is ambiguous
          # (nginx emits one of its own when the page is missing; so does an overloaded upstream), and the
          # header is set by nginx even when the page failed to render. Only the body marker proves our page
          # actually rendered. Waving a genuinely broken site through as "in maintenance" is the failure this
          # closes — so all three, in both places it is called.
          in_maintenance() {
            local c
            c=$(curl -sS --max-time 20 -D "$hdr" -o "$body" -w '%{http_code}' "$origin/" 2>/dev/null || true)
            [ "$c" = 503 ] \
              && grep -qi '^x-cogno-maintenance:' "$hdr" \
              && grep -qF 'cogno-maintenance-page-v1' "$body"
          }

          # The 200-expecting probes. --retry survives a transient blip, but is BOUNDED — if maintenance is
          # armed mid-loop these meet the same Retry-After: 120. Content-type comes from -w, not from a header
          # file: curl APPENDS a header block per retry attempt rather than truncating, so grepping the file
          # could read attempt 1's headers and judge attempt 3's status.
          probe() {
            curl -sS --retry 3 --retry-delay 2 --retry-max-time 30 --max-time 20 \
                 -o "$body" -w '%{http_code} %{content_type}' "$1" 2>/dev/null || true
          }

          if in_maintenance; then
            echo "::warning::THE SITE IS IN MAINTENANCE MODE. The new bundle shipped to /var/www/cogno and is"
            echo "::warning::in place, but it is NOT being served to anyone, and the SPA-shell smoke check below"
            echo "::warning::could not run (every URL answers 503 by design)."
            echo "::warning::Take the site back out and the checks run there: Actions -> maintenance -> state: off."
            exit 0
          fi

          for url in "$origin/u/$addr/" "$origin/post/1/"; do
            read -r code _ <<<"$(probe "$url")"
            [ "$code" = 200 ] || { echo "::error::deep-link document $url -> HTTP $code (want 200)"; fail=1; }
          done
          for url in "$origin/u/$addr/index.txt" "$origin/post/1/index.txt"; do
            read -r code ctype <<<"$(probe "$url")"
            case "$code:$ctype" in
              200:text/plain*) ;;
              *) echo "::error::RSC payload $url -> HTTP $code (${ctype:-no content-type}); want 200 text/plain"; fail=1 ;;
            esac
          done
          if [ "$fail" = 1 ]; then
            # Before blaming nginx, rule out the race: maintenance can be armed in the seconds between the
            # pre-flight above and here. Without this, the run would go red telling the operator to go edit and
            # reload nginx on the live box — a confident, wrong diagnosis delivered mid-incident.
            if in_maintenance; then
              echo "::warning::maintenance mode was turned ON while this check was running. The bundle shipped;"
              echo "::warning::the smoke check did not run. Re-run it via: Actions -> maintenance -> state: off."
              exit 0
            fi
            echo "::error::nginx is not serving the dynamic-route SPA shell's RSC payloads. Install the"
            echo "::error::current deploy/nginx/cogno.conf on the droplet (re-apply your domain — the committed"
            echo "::error::copy is a template that says cogno.example.io) and reload:"
            echo "::error::  cp deploy/nginx/cogno.conf /etc/nginx/sites-available/cogno.conf"
            echo "::error::  sed -i 's/cogno.example.io/<your-domain>/g' /etc/nginx/sites-available/cogno.conf"
            echo "::error::  nginx -t && systemctl reload nginx"
            exit 1
          fi
          echo "SPA shell OK: both the document and the RSC payload resolve for /u/<addr>/ and /post/<id>/."
