name: ci

# Build + test the layers of the all-Rust cogno-chain on every push / PR:
#   • rust        — clippy (-D warnings) + unit tests + a real-wasm workspace build, over the WHOLE
#                   workspace: node, runtime, the FRAME pallets, cogno-chain-cli, and the shared
#                   cogno-dbsync / cogno-keyfile crates. The cross-language observation golden fixture
#                   (node-writer vs CLI-reader byte-identity) now lives Rust-only in `cargo test -p
#                   cogno-dbsync` — a divergence there is a chain fork.
#   • contracts   — the Aiken L1 talk_vault validator (aiken check: property/fuzz + boundary tests).
#   • frontend    — the Next.js static export (lint + Vitest pure-logic units + build).
#   • cip8-oracle — the independent pycardano CIP-8 verifier (ci/cip8-oracle/), kept as an adversarial
#                   SECOND implementation of the on-chain verifier (pallets/cogno-gate/src/cip8.rs).
#
# Each of those four runs only when the ref actually touches the layer it gates — see the `changes` job.
on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: this pipeline only builds + tests, it never writes repo contents.
permissions:
  contents: read
  # Read-only, and load-bearing. On `pull_request`, dorny/paths-filter reads the changed-file list from
  # the REST API (GET /pulls/{n}/files) — the authoritative answer. An explicit `permissions:` block sets
  # every scope it does NOT list to `none`, so without this line the filter 403s on every PR, the
  # `changes` job dies, and all four jobs below skip: CI would silently run NOTHING and report green.
  pull-requests: read

# Cancel superseded runs on the same ref. (Deploy is a separate, manual workflow — deploy-app.yml —
# so nothing here is ever mid-deploy; cancelling a stale build run is safe.)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Which layers did this ref actually touch? Every job below is gated on this, because a frontend-only
  # change was paying for a 10-minute whole-workspace Rust build: 142 of the last 209 runs compiled the
  # polkadot-sdk with ZERO Rust files changed.
  #
  # A job skipped by a job-level `if:` bills no minutes and still posts a check run (conclusion `skipped`,
  # which branch protection counts as success). A top-level `on.<event>.paths` filter would be simpler but
  # posts NO check run at all — the day branch protection lands, a required check that never reports leaves
  # the PR stuck on "Expected" forever. Do not convert this to `on.paths`.
  #
  # The filters are deliberately BROAD, because the failure mode here is fail-OPEN: an over-triggered job
  # wastes ~10 minutes, but an under-triggered one merges a broken tree green. When in doubt, add the glob.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      contracts: ${{ steps.filter.outputs.contracts }}
      frontend: ${{ steps.filter.outputs.frontend }}
      # Underscore, not `cip8-oracle`: in a GitHub expression `steps.filter.outputs.cip8-oracle` parses as
      # SUBTRACTION (cip8 minus oracle), evaluates to NaN, and would never equal 'true' — the oracle would
      # silently never run again. Filter names must stay identifier-safe.
      cip8_oracle: ${{ steps.filter.outputs.cip8_oracle }}
    steps:
      # fetch-depth 0 is for the `push` path, where dorny diffs against github.event.before with real git.
      # (On pull_request it uses the REST API and needs no history — but the full clone is ~0.4 MB here.)
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # SHA-pinned, not @v3: a mutable major tag on a third-party action is the tj-actions/changed-files
      # supply-chain footgun, and this workflow otherwise avoids third-party actions entirely.
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          # No `base:` — it is ignored on pull_request, and on push dorny already defaults to the commit
          # before the push.
          filters: |
            # The `**/*.rs` + `**/Cargo.toml` catch-alls cover a new crate at a new top-level directory
            # even if nobody remembers to update this list. Cargo.lock is load-bearing on its own: a
            # dependabot cargo bump touches ONLY Cargo.lock and a Cargo.toml.
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'node/**'
              - 'runtime/**'
              - 'cli/**'
              - 'pallets/**'
              - 'cogno-dbsync/**'
              - 'cogno-keyfile/**'
              - '.github/workflows/ci.yml'
            # ci.yml is NOT optional here: the aiken compiler pin (setup-aiken v1.1.22) lives in THIS file,
            # and a compiler bump moves the compiled UPLC hash. Without this glob, a bot PR bumping the pin
            # would skip the live-hash guard and merge green — orphaning the deployed preprod vault.
            contracts:
              - 'contracts/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'app/**'
              # LOAD-BEARING, do not tidy away. `npm run lint` runs app/scripts/check-spec.mjs, which reads
              # ../../runtime/src/lib.rs and fails if the runtime's spec_version has drifted from
              # DESCRIPTOR_SPEC_VERSION in app/src/lib/chain/client.ts. Without this glob a runtime-only
              # spec bump skips the frontend job, the drift merges green, and the app ships mis-encoded
              # writes against the new runtime with its own boot guard blind.
              - 'runtime/src/lib.rs'
              - '.github/workflows/ci.yml'
            # Deliberately NOT 'app/**'. The oracle npm-ci's app's deps and shells out to
            # app/scripts/m2-cip8-fixture.mjs, but that fixture imports only node_modules (@meshsdk,
            # blakejs, hdkd, polkadot-api) — it has no relative import into app/src, so an app/src change
            # cannot affect it. cogno-gate is insurance: the whole point of the oracle is to shadow
            # pallets/cogno-gate/src/cip8.rs with an independent implementation.
            cip8_oracle:
              - 'ci/cip8-oracle/**'
              - 'app/scripts/**'
              - 'app/package.json'
              - 'app/package-lock.json'
              - 'pallets/cogno-gate/**'
              - '.github/workflows/ci.yml'

  rust:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Shrink the whole-workspace debug build's target/ footprint so it fits the runner disk: drop
      # debuginfo (the single biggest contributor) + incremental artifacts. No effect on lint/test
      # validity — assertion messages still show; only backtrace source lines are trimmed.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v7
      # The full polkadot-sdk debug build (node + runtime + pallets + cli, incl. RocksDB's C++) overflows
      # the ~14 GB free root disk on ubuntu-latest (`ar: No space left on device` on librocksdb.a, ~50 min
      # into the test build). Reclaim ~25-30 GB of preinstalled toolchains we never use (root → ~40 GB
      # free). Inline rm rather than a third-party action, to keep the least-privilege posture.
      - name: free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune --all --force || true
          df -h /
      # rustc is pinned by rust-toolchain.toml to 1.93.0 (the toolchain the polkadot-sdk stable2606
      # train is built against); dtolnay pins the same version. clippy is NOT in the pin's components,
      # so request it explicitly (with rust-src + the wasm targets the substrate wasm-builder needs —
      # mirrors rust-toolchain.toml). `cargo fmt --check` is intentionally NOT gated: the codebase
      # predates a rustfmt config and is tab-styled; enforcing a repo-wide reformat is out of scope.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: clippy, rust-src
          targets: wasm32v1-none, wasm32-unknown-unknown
      # librocksdb-sys compiles RocksDB (C++) via bindgen even for `cargo clippy`, and libp2p needs
      # protoc — so the native toolchain deps are required before the workspace check, not just the build.
      - name: system build deps (rocksdb/bindgen + protobuf)
        run: >
          sudo apt-get update &&
          sudo apt-get install -y clang llvm-dev libclang-dev protobuf-compiler cmake libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          # The repo cache sits at 10.9 GB against GitHub's hard 10 GB limit, so it is in permanent LRU
          # eviction — and the thing being evicted is this 1.29 GB rust cache, because every PR branch was
          # writing its own copy alongside a 0.21 GB npm cache. That is why a dependabot rust job averaged
          # 27 minutes against a 10-minute fleet average: not the Cargo.lock key miss, the eviction.
          #
          # Restrict WRITES to main — the lineage every PR restores from (GitHub cache scoping already lets
          # a PR read its base branch's cache) — plus the dependency branches, which are the only ones that
          # legitimately need a lineage of their own across pushes, since a Cargo.lock bump partially misses
          # main's key. Every other branch is restore-only. This is also why `push: branches: [main]` below
          # stays: with save-if in place, it is the sole writer of the cache all PRs depend on.
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.head_ref, 'dependabot/') }}
          # Default behaviour saves nothing when the job fails, which makes a red dependency PR re-pay the
          # full cold build on every push until it goes green.
          cache-on-failure: true
      # Cache-poison guard for the SKIP_WASM_BUILD clippy pass below. substrate-wasm-builder writes a
      # build-script output (`.../build/<crate>-<hash>/out/wasm_binary.rs`) that `include_bytes!` a
      # `target/*/wbuild/<crate>/<crate>.wasm`. rust-cache can restore that wasm_binary.rs while the
      # referenced wbuild wasm is absent from the saved cache — so `cargo clippy` (which, with
      # SKIP_WASM_BUILD set, does NOT rebuild the wasm) compiles the crate against a missing file and
      # dies in ~10s: `couldn't read .../wbuild/.../frame_storage_access_test_runtime.wasm`. The first
      # run on a given Cargo.lock cache key seeds this state; every cache-hit run after it fails. Drop
      # the wbuild dir + every wasm-builder build-script dir (those owning a wasm_binary.rs) so the
      # build scripts re-run and clippy re-emits the skipped stub (no include_bytes) fresh. Targets only
      # wasm-builder crates — rocksdb/protobuf/etc. build dirs are untouched, so the cache still warms
      # the expensive native deps. No-op on a clean/cache-miss tree (no target/).
      - name: reset stale substrate wasm-builder outputs (rust-cache cache-poison guard)
        run: |
          [ -d target ] || exit 0
          rm -rf target/*/wbuild || true
          find target -type f -path '*/build/*/out/wasm_binary.rs' | while read -r f; do
            rm -rf "$(dirname "$(dirname "$f")")"
          done
      # Clippy over the whole workspace + all targets, denying warnings. SKIP_WASM_BUILD keeps this the
      # fast native pass (the real runtime-wasm build is the `build` step below). `-A result_large_err`
      # suppresses the SDK's large-error-enum lint on the node crate — sc_service / sc_cli error enums are
      # large by construction and boxing them fights the SDK; it is a no-op for the FRAME pallets, whose
      # DispatchError is small. Everything else is -D warnings.
      - name: clippy (workspace, -D warnings)
        env:
          SKIP_WASM_BUILD: "1"
        run: >
          cargo clippy --workspace --all-targets --locked --
          -D warnings -A clippy::result_large_err
      - name: test (workspace)
        run: cargo test --workspace --locked
      # The `test` step above already builds the real runtime wasm (runtime/build.rs runs the substrate
      # wasm-builder; SKIP_WASM_BUILD is set only on the clippy step). This is the final gate that the whole
      # workspace — including the release-path node + cli binaries — links clean: a cheap incremental
      # confirmation on top of the warmed artifacts.
      - name: build (workspace)
        run: cargo build --workspace --locked

  contracts:
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.22
      - name: aiken check
        working-directory: contracts
        run: aiken check
      # Live-hash guard: the L1 talk_vault is deployed on preprod, so a source change that moves the
      # compiled blueprint hash must be an INTENTIONAL redeploy. `aiken check` does not rebuild
      # plutus.json, so rebuild it here (pinned aiken v1.1.22 makes the build reproducible) and fail if
      # the committed hash moved. If the change is intentional, commit the regenerated plutus.json.
      - name: guard the live script hash
        working-directory: contracts
        run: |
          aiken build
          git diff --exit-code plutus.json

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: install deps (retry transient npm network errors)
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci attempt $i/3 failed; retrying in 15s"
            sleep 15
          done
          exit 1
      - name: lint
        run: npm run lint
      # `next build` type-checks only the module graph it actually bundles, so it does NOT see test files
      # or any module no route imports — a type error there passes both `next build` AND vitest (which
      # transpiles without checking). That combination has already shipped a red `tsc` through a green CI
      # on this repo. tsc is the only gate that reads every file the tsconfig covers.
      - name: typecheck (tsc — the whole project, not just the bundled graph)
        run: npx tsc --noEmit --incremental false
      - name: test (vitest — pure logic units)
        run: npm run test
      - name: build (static export)
        # `endpoints.ts` refuses a production build without an explicit wss:// endpoint. This build is
        # never deployed, so it names a reserved-TLD host (RFC 2606) rather than the live relay — the
        # deploy-app job below supplies the real one.
        env:
          NEXT_PUBLIC_WS_URL: wss://ci-build.invalid/rpc
        run: npm run build
      # Serves the BUILT out/ under the same SPA rewrites nginx applies in prod. `next build` succeeding
      # says nothing about whether a deep link resolves once the export is behind those rules.
      - name: smoke (the built export under the prod rewrites)
        run: npm run smoke

  cip8-oracle:
    # The independent pycardano CIP-8 verifier is an adversarial second implementation of the on-chain
    # verifier, kept precisely because it does NOT share the Rust verifier's lineage. test_agreement.py
    # shells out to a headless MeshJS fixture (app/scripts/m2-cip8-fixture.mjs) to generate REAL
    # wallet-signed proofs, so this job needs BOTH node (for the fixture + its app deps) and python.
    needs: changes
    if: ${{ needs.changes.outputs.cip8_oracle == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: install app deps (the CIP-8 fixture's MeshJS deps)
        working-directory: app
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci attempt $i/3 failed; retrying in 15s"
            sleep 15
          done
          exit 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ci/cip8-oracle/requirements.txt
      - name: install oracle deps
        working-directory: ci/cip8-oracle
        run: pip install -r requirements.txt
      # NODE_BIN=node resolves to the setup-node v22.12.0 on PATH (test_agreement.py defaults to `node`
      # but we set it explicitly to document the dependency — the snap node is unusable, see CLAUDE.md).
      - name: cip8 agreement oracle (beacon derivation + two-sided byte agreement)
        working-directory: ci/cip8-oracle
        env:
          NODE_BIN: node
        run: |
          python test_beacon.py
          python test_agreement.py
