name: ci

# Build + test the layers of cogno-chain on every push / PR:
#   • contracts — the Aiken L1 talk_vault validator (aiken check: property/fuzz + boundary tests)
#   • rust      — clippy + unit tests for the FRAME pallets (the full node/runtime wasm build is
#                 heavy and left to the release path; the pallets are the logic)
#   • frontend  — the Next.js static export (type-check + build) + lint + Vitest unit tests
#   • services  — the off-chain JS relayer/committee/_shared helpers, the SubQuery indexer's pure
#                 mapping logic, and the Python Cogno-Follower (hand-rolled suites, exit-on-fail)
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.22
      - name: aiken check
        working-directory: contracts
        run: aiken check

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The repo pins rustc 1.90.0 (rust-toolchain.toml); clippy is not in that pin's components,
      # so request it explicitly. (`cargo fmt --check` is intentionally NOT gated: the codebase
      # predates a rustfmt config and is tab-styled; enforcing a repo-wide reformat is out of scope.)
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (pallets)
        run: >
          cargo clippy
          -p pallet-microblog -p pallet-talk-stake -p pallet-cogno-gate
          -p pallet-anchor -p pallet-validator-set
      - name: test (pallets)
        run: >
          cargo test
          -p pallet-microblog -p pallet-talk-stake -p pallet-cogno-gate
          -p pallet-anchor -p pallet-validator-set

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: test (vitest — pure logic units)
        run: npm run test
      - name: build (static export)
        run: npm run build

  services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      # The committee tooling resolves @polkadot/api through a node_modules symlink to the
      # indexer; the Cogno-Follower's CIP-8 agreement test shells out to a MeshJS fixture in app/.
      - name: install indexer deps (committee symlinks here for @polkadot)
        working-directory: services/indexer
        run: npm ci
      - name: install app deps (Cogno-Follower CIP-8 fixture + PAPI descriptors)
        working-directory: app
        run: npm ci
      - name: recreate gitignored node_modules symlinks
        run: |
          ln -sfn ../indexer/node_modules services/committee/node_modules
          ln -sfn ../../app/node_modules services/anchor-relayer/node_modules
      - name: js — anchor-relayer + _shared + committee
        run: |
          node services/anchor-relayer/relayer.test.mjs
          node services/_shared/shared.test.mjs
          node services/committee/committee.test.mjs
      - name: indexer — pure mapping unit tests + typecheck
        working-directory: services/indexer
        run: |
          node --experimental-strip-types src/mappings/pure.test.ts
          npx tsc --noEmit -p tsconfig.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install Cogno-Follower deps
        working-directory: services/cogno-follower
        run: pip install -r requirements.txt
      - name: python — Cogno-Follower (beacon / vault / http / CIP-8 agreement)
        working-directory: services/cogno-follower
        run: |
          python test_beacon.py
          python test_vault.py
          python test_http.py
          python test_agreement.py
